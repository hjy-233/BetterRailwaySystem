name: Version compatibility issue | 版本兼容问题
description: Report a problem with a specific Minecraft/Fabric version branch. | 报告特定 Minecraft/Fabric 版本分支的问题。
title: "[Compat | 兼容]: "
labels:
  - compatibility | 兼容性
body:
  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version | Minecraft 版本
      placeholder: "1.20.6 / 1.21.4 / 1.21.11"
    validations:
      required: true
  - type: input
    id: branch
    attributes:
      label: Expected branch | 预期分支
      description: The branch or jar series you think should support this version. | 你认为应该支持该版本的分支或 jar 系列。
      placeholder: release/1.20.5-1.20.6
    validations:
      required: true
  - type: input
    id: mod-version
    attributes:
      label: BetterRailwaySystem jar | BetterRailwaySystem jar 文件
      placeholder: BetterRailwaySystem-<version>-mc<mc-version>.jar
    validations:
      required: true
  - type: input
    id: loader-version
    attributes:
      label: Fabric Loader version | Fabric Loader 版本
      placeholder: "0.16.14"
    validations:
      required: true
  - type: input
    id: fabric-api-version
    attributes:
      label: Fabric API version | Fabric API 版本
      placeholder: "0.100.8+1.20.6"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Compatibility problem | 兼容性问题
      description: Explain whether it fails to launch, crashes in game, has missing classes, or behaves differently. | 说明是无法启动、游戏内崩溃、缺少类，还是行为不一致。
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs | 日志
      render: text
    validations:
      required: true
