name: Build and Release

on:
  push:
    branches:
      - dev
      - "release/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 2026.07.13-1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

env:
  MODRINTH_PROJECT_ID: betterrailwaysystem
  MODRINTH_FABRIC_API_ID: P7dR8mSH
  MODRINTH_CLOTH_CONFIG_ID: 9s6osm5g
  MODRINTH_MOD_MENU_ID: mOgUt4GM
  MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

jobs:
  prerelease:
    name: Build current branch and publish beta
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        id: build
        shell: bash
        run: |
          set -euo pipefail

          minecraft_version="$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)"
          timestamp="$(TZ=Asia/Shanghai date +'%Y%m%d-%H%M')"
          version="${timestamp}-mc${minecraft_version}"
          branch_slug="${GITHUB_REF_NAME//\//-}"
          artifact="BetterRailwaySystem-${version}.jar"

          ./gradlew --no-daemon clean build -Pmod_version="${version}"

          mkdir -p release-artifacts
          built_jar="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | head -n 1)"
          cp "${built_jar}" "release-artifacts/${artifact}"

          {
            echo "minecraft_version=${minecraft_version}"
            echo "version=${version}"
            echo "branch_slug=${branch_slug}"
            echo "artifact=${artifact}"
            echo "tag=pre-${branch_slug}-${version}-${GITHUB_SHA::7}"
            echo "title=BetterRailwaySystem ${version} (${GITHUB_REF_NAME})"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub beta release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ steps.build.outputs.tag }}" release-artifacts/*.jar \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.build.outputs.title }}" \
            --generate-notes \
            --prerelease

      - name: Publish Modrinth beta version
        if: env.MODRINTH_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail

          artifact="release-artifacts/${{ steps.build.outputs.artifact }}"
          changelog="Automated beta build from ${GITHUB_REF_NAME} at ${GITHUB_SHA}."
          data="$(jq -nc \
            --arg name "BetterRailwaySystem ${{ steps.build.outputs.version }}" \
            --arg version_number "${{ steps.build.outputs.version }}" \
            --arg changelog "${changelog}" \
            --arg project_id "${MODRINTH_PROJECT_ID}" \
            --arg game_version "${{ steps.build.outputs.minecraft_version }}" \
            --arg fabric_api_id "${MODRINTH_FABRIC_API_ID}" \
            --arg cloth_config_id "${MODRINTH_CLOTH_CONFIG_ID}" \
            --arg mod_menu_id "${MODRINTH_MOD_MENU_ID}" \
            '{
              name: $name,
              version_number: $version_number,
              changelog: $changelog,
              dependencies: [
                {project_id: $fabric_api_id, dependency_type: "required"},
                {project_id: $cloth_config_id, dependency_type: "required"},
                {project_id: $mod_menu_id, dependency_type: "optional"}
              ],
              game_versions: [$game_version],
              version_type: "beta",
              loaders: ["fabric"],
              featured: false,
              project_id: $project_id,
              file_parts: ["file"],
              primary_file: "file"
            }')"

          curl --fail-with-body -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -H "User-Agent: hjy-233/BetterRailwaySystem GitHub Actions" \
            -F "data=${data}" \
            -F "file=@${artifact}"

  release:
    name: Build all supported branches and publish release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all branches
        id: build
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"
          mkdir -p release-artifacts
          : > release-artifacts/modrinth-versions.tsv

          mapfile -t branches < <(
            git for-each-ref refs/remotes/origin --format='%(refname:short)' \
              | sed 's#^origin/##' \
              | grep -E '^(dev|release/.+)$' \
              | sort -V
          )

          if [ "${#branches[@]}" -eq 0 ]; then
            echo "No supported branches found." >&2
            exit 1
          fi

          for branch in "${branches[@]}"; do
            echo "::group::Build ${branch}"
            git checkout --force -B "${branch}" "origin/${branch}"

            minecraft_version="$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)"
            artifact="BetterRailwaySystem-${version}-mc${minecraft_version}.jar"
            modrinth_version="${version}-mc${minecraft_version}"

            ./gradlew --no-daemon clean build -Pmod_version="${version}"

            built_jar="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | head -n 1)"
            cp "${built_jar}" "release-artifacts/${artifact}"
            printf '%s\t%s\t%s\t%s\n' "${artifact}" "${modrinth_version}" "${minecraft_version}" "${branch}" >> release-artifacts/modrinth-versions.tsv
            echo "::endgroup::"
          done

          {
            echo "tag=v${version}"
            echo "title=BetterRailwaySystem ${version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ steps.build.outputs.tag }}" release-artifacts/*.jar \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.build.outputs.title }}" \
            --generate-notes

      - name: Publish Modrinth release versions
        if: env.MODRINTH_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail

          while IFS=$'\t' read -r artifact version_number minecraft_version branch; do
            changelog="Automated release build from ${branch}. See the GitHub release notes for full changes."
            data="$(jq -nc \
              --arg name "BetterRailwaySystem ${version_number}" \
              --arg version_number "${version_number}" \
              --arg changelog "${changelog}" \
              --arg project_id "${MODRINTH_PROJECT_ID}" \
              --arg game_version "${minecraft_version}" \
              --arg fabric_api_id "${MODRINTH_FABRIC_API_ID}" \
              --arg cloth_config_id "${MODRINTH_CLOTH_CONFIG_ID}" \
              --arg mod_menu_id "${MODRINTH_MOD_MENU_ID}" \
              '{
                name: $name,
                version_number: $version_number,
                changelog: $changelog,
                dependencies: [
                  {project_id: $fabric_api_id, dependency_type: "required"},
                  {project_id: $cloth_config_id, dependency_type: "required"},
                  {project_id: $mod_menu_id, dependency_type: "optional"}
                ],
                game_versions: [$game_version],
                version_type: "release",
                loaders: ["fabric"],
                featured: true,
                project_id: $project_id,
                file_parts: ["file"],
                primary_file: "file"
              }')"

            curl --fail-with-body -X POST "https://api.modrinth.com/v2/version" \
              -H "Authorization: ${MODRINTH_TOKEN}" \
              -H "User-Agent: hjy-233/BetterRailwaySystem GitHub Actions" \
              -F "data=${data}" \
              -F "file=@release-artifacts/${artifact}"
          done < release-artifacts/modrinth-versions.tsv
